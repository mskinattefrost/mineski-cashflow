function fmt(n, compact) {
  if (n===null||n===undefined||isNaN(n)) return "—";
  var abs = Math.abs(n);
  if (compact) {
    if (abs>=1e6) return (n<0?"(":"")+"₱"+(abs/1e6).toFixed(2)+"M"+(n<0?")":"");
    if (abs>=1e3) return (n<0?"(":"")+"₱"+(abs/1e3).toFixed(0)+"K"+(n<0?")":"");
    return (n<0?"(":"")+"₱"+abs.toFixed(0)+(n<0?")":"");
  }
  return (n<0?"(₱":"₱")+abs.toLocaleString("en-PH",{minimumFractionDigits:2,maximumFractionDigits:2})+(n<0?")":"");
}

// ── AR SUMMARY ────────────────────────────────────────────────────────────────

function ARSummary() {
  var byAccountMap = {};
  AR_OPEN.filter(function(r){return r.amount>0;}).forEach(function(r){
    if (!byAccountMap[r.account]) byAccountMap[r.account]={count:0,total:0,statuses:[],pic:r.pic};
    byAccountMap[r.account].count++;
    byAccountMap[r.account].total+=r.amount;
    if (byAccountMap[r.account].statuses.indexOf(r.status)===-1) byAccountMap[r.account].statuses.push(r.status);
  });
  var byAccount = Object.entries(byAccountMap).sort(function(a,b){return b[1].total-a[1].total;});

  var kpis = [
    {label:"Total open AR",val:fmt(totalOpen,true),sub:AR_OPEN.length+" invoices",col:"#1a5fa8"},
    {label:"High priority",val:fmt(totalHigh,true),sub:highPriority.length+" overdue accounts",col:"#e63329"},
    {label:"For payment follow-up",val:fmt(AR_OPEN.filter(function(r){return r.status==="For Payment Follow-Up";}).reduce(function(s,r){return s+r.amount;},0),true),sub:"Awaiting client payment",col:"#c85000"},
    {label:"For invoicing",val:fmt(AR_OPEN.filter(function(r){return r.status==="For Invoicing";}).reduce(function(s,r){return s+r.amount;},0),true),sub:"Invoice not yet raised",col:"#1a7a4a"},
    {label:"Collected YTD",val:fmt(totalCollected,true),sub:COLLECTED.length+" invoices closed",col:"#1a7a4a"},
    {label:"Due this week (W13)",val:fmt(thisWeekTotal,true),sub:thisWeekAR.length+" items",col:"#7a0000"},
  ];

  return h('div',null,
    h('div',{style:{fontSize:16,fontWeight:500,marginBottom:4}},"AR Summary"),
    h('div',{style:{fontSize:12,color:"var(--color-text-secondary)",marginBottom:16}},WEEK+" · "+DATE),
    h('div',{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:20}},

          h('div',{style:{fontSize:17,fontWeight:600,color:k.col}},k.val),
          h('div',{style:{fontSize:11,color:"var(--color-text-tertiary)",marginTop:2}},k.sub)

    h('div',{style:{fontSize:13,fontWeight:500,marginBottom:10}},"Open AR by Account"),
    h('div',{style:{overflowX:"auto"}},
      h('table',{style:{width:"100%",borderCollapse:"collapse",fontSize:12}},
        h('thead',null,
          h('tr',{style:{borderBottom:"1px solid var(--color-border-secondary)"}},
            ["Account","Invoices","Total Open","Status","PIC"].map(function(hd,i){
              return h('th',{key:i,style:{textAlign:i<2?"left":"right",padding:"6px 8px",fontSize:11,color:"var(--color-text-secondary)",fontWeight:500}},hd);

                  return h('span',{key:si,style:{fontSize:10,padding:"1px 6px",borderRadius:4,background:s==="For Payment Follow-Up"?"#fff0ee":s==="Collected"?"#e8f5ee":"#f0f7ff",color:s==="For Payment Follow-Up"?"#c00":s==="Collected"?"#1a7a4a":"#1a5fa8",marginLeft:si>0?4:0}},

// ── APP ───────────────────────────────────────────────────────────────────────

var SLIDES = ["Cover","Overview","Cash Position","Weekly Table","AR Standard","AR Summary","Full Year"];
var COMPS = [Cover,Overview,CashPosition,WeeklyTable,ARStandard,ARSummary,FullYear];

function App() {
  var _s = useState(0); var slide=_s[0],setSlide=_s[1];
  function nav(d){ setSlide(function(s){return Math.max(0,Math.min(SLIDES.length-1,s+d));}); }
  var SlideComp = COMPS[slide];
  return h('div',{className:"app-wrap"},
    h('div',{style:{display:"flex",gap:4,marginBottom:16,flexWrap:"wrap",alignItems:"center",borderBottom:"0.5px solid var(--color-border-tertiary)",paddingBottom:10}},
      SLIDES.map(function(s,i){
        return h('button',{key:i,onClick:function(){setSlide(i);},style:{background:slide===i?"#1a1a1a":"none",color:slide===i?"#fff":"var(--color-text-secondary)",border:"0.5px solid",borderColor:slide===i?"#1a1a1a":"var(--color-border-tertiary)",borderRadius:6,padding:"4px 11px",fontSize:12,fontWeight:slide===i?500:400,cursor:"pointer"}},s);
      }),
      h('div',{style:{marginLeft:"auto",display:"flex",gap:8,alignItems:"center"}},
        h('button',{onClick:function(){nav(-1);},disabled:slide===0,style:{background:"none",border:"0.5px solid var(--color-border-tertiary)",borderRadius:6,padding:"4px 10px",fontSize:12,cursor:"pointer",color:"var(--color-text-secondary)"}},"←"),
        h('span',{style:{fontSize:11,color:"var(--color-text-tertiary)"}},(slide+1)+" / "+SLIDES.length),
        h('button',{onClick:function(){nav(1);},disabled:slide===SLIDES.length-1,style:{background:"none",border:"0.5px solid var(--color-border-tertiary)",borderRadius:6,padding:"4px 10px",fontSize:12,cursor:"pointer",color:"var(--color-text-secondary)"}},"→")

    ),
    h(SlideComp,null),
    h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:20,paddingTop:12,borderTop:"0.5px solid var(--color-border-tertiary)"}},
      h('div',{style:{fontSize:11,color:"var(--color-text-tertiary)"}},"Mineski PH · "+WEEK+" · "+DATE),

      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App,null));
