function fmt(n, compact) {
  if (n===null||n===undefined||isNaN(n)) return "—";
  var abs = Math.abs(n);
  if (compact) {
    if (abs>=1e6) return (n<0?"(":"")+"₱"+(abs/1e6).toFixed(2)+"M"+(n<0?")":"");
    if (abs>=1e3) return (n<0?"(":"")+"₱"+(abs/1e3).toFixed(0)+"K"+(n<0?")":"");
    return (n<0?"(":"")+"₱"+abs.toFixed(0)+(n<0?")":"");
  }
  return (n<0?"(₱":"₱")+abs.toLocaleString("en-PH",{minimumFractionDigits:2,maximumFractionDigits:2})+(n<0?")":"");
}

// ── APP ───────────────────────────────────────────────────────────────────────

var SLIDES = ["Cover","Overview","Cash Position","Weekly Table","Weekly Table (Liquidity)","AR Standard","AR Summary","Full Year"];
var COMPS = [Cover,Overview,CashPosition,WeeklyTable,WeeklyTableLiquidity,ARStandard,ARSummary,FullYear];

function App() {
  var _s = useState(0); var slide=_s[0],setSlide=_s[1];
  function nav(d){ setSlide(function(s){return Math.max(0,Math.min(SLIDES.length-1,s+d));}); }
  var SlideComp = COMPS[slide];
  return h('div',{className:"app-wrap"},
    h('div',{style:{display:"flex",gap:4,marginBottom:16,flexWrap:"wrap",alignItems:"center",borderBottom:"0.5px solid var(--color-border-tertiary)",paddingBottom:10}},
      SLIDES.map(function(s,i){
        return h('button',{key:i,onClick:function(){setSlide(i);},style:{background:slide===i?"#1a1a1a":"none",color:slide===i?"#fff":"var(--color-text-secondary)",border:"0.5px solid",borderColor:slide===i?"#1a1a1a":"var(--color-border-tertiary)",borderRadius:6,padding:"4px 11px",fontSize:12,fontWeight:slide===i?500:400,cursor:"pointer"}},s);
      }),
      h('div',{style:{marginLeft:"auto",display:"flex",gap:8,alignItems:"center"}},
        h('button',{onClick:function(){nav(-1);},disabled:slide===0,style:{background:"none",border:"0.5px solid var(--color-border-tertiary)",borderRadius:6,padding:"4px 10px",fontSize:12,cursor:"pointer",color:"var(--color-text-secondary)"}},"←"),
        h('span',{style:{fontSize:11,color:"var(--color-text-tertiary)"}},(slide+1)+" / "+SLIDES.length),
        h('button',{onClick:function(){nav(1);},disabled:slide===SLIDES.length-1,style:{background:"none",border:"0.5px solid var(--color-border-tertiary)",borderRadius:6,padding:"4px 10px",fontSize:12,cursor:"pointer",color:"var(--color-text-secondary)"}},"→")
      )
    ),
    h(SlideComp,null),
    h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:20,paddingTop:12,borderTop:"0.5px solid var(--color-border-tertiary)"}},
      h('div',{style:{fontSize:11,color:"var(--color-text-tertiary)"}},"Mineski PH · "+WEEK+" · "+DATE),
      h('div',{style:{display:"flex",gap:8}},
        h('button',{onClick:function(){nav(-1);},disabled:slide===0,style:{background:"none",border:"0.5px solid var(--color-border-tertiary)",borderRadius:6,padding:"5px 14px",fontSize:12,cursor:"pointer",color:"var(--color-text-secondary)"}},"← Prev"),
        h('button',{onClick:function(){nav(1);},disabled:slide===SLIDES.length-1,style:{background:"#0f0f0f",border:"none",borderRadius:6,padding:"5px 14px",fontSize:12,cursor:"pointer",color:"#fff"}},"Next →")
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App,null));
